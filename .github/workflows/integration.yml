name: integration

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  install-integration:
    name: install integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: ensure scripts are executable
        run: chmod +x scripts/*.sh hooks/*.sh
      - name: run install integration tests
        run: bash scripts/test-install.sh

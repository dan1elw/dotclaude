name: validate-shell-and-json

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: check scripts and hooks
        run: shellcheck scripts/*.sh hooks/*.sh

  validate-json:
    name: validate json
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: validate settings.json files
        run: |
          set -e
          for f in settings.json settings.local.json.example .claude/settings.json; do
            echo "checking $f"
            jq empty "$f"
          done
